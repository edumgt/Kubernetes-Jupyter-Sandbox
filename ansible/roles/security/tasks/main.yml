- name: Install security packages
  apt:
    name:
      - fail2ban
      - ufw
    state: present

- name: Default deny incoming
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Default allow outgoing
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Allow SSH
  community.general.ufw:
    rule: allow
    port: '22'
    proto: tcp

- name: Allow HTTP
  community.general.ufw:
    rule: allow
    port: '80'
    proto: tcp

- name: Allow HTTPS
  community.general.ufw:
    rule: allow
    port: '443'
    proto: tcp

- name: Allow k3s API
  community.general.ufw:
    rule: allow
    port: '6443'
    proto: tcp

- name: Allow frontend NodePort
  community.general.ufw:
    rule: allow
    port: '30080'
    proto: tcp

- name: Allow backend NodePort
  community.general.ufw:
    rule: allow
    port: '30081'
    proto: tcp

- name: Allow Jupyter NodePort
  community.general.ufw:
    rule: allow
    port: '30088'
    proto: tcp

- name: Allow Airflow NodePort
  community.general.ufw:
    rule: allow
    port: '30090'
    proto: tcp

- name: Enable UFW
  community.general.ufw:
    state: enabled

- name: Deploy fail2ban jail.local
  copy:
    dest: /etc/fail2ban/jail.local
    mode: '0644'
    content: |
      [DEFAULT]
      bantime = 10m
      findtime = 10m
      maxretry = 5
      backend = systemd

      [sshd]
      enabled = true

- name: Enable fail2ban
  service:
    name: fail2ban
    enabled: true
    state: started
