- name: Create promtail user
  user:
    name: promtail
    shell: /usr/sbin/nologin
    system: true
    create_home: false

- name: Download promtail
  get_url:
    url: https://github.com/grafana/loki/releases/download/v3.2.1/promtail-linux-amd64.zip
    dest: /tmp/promtail-linux-amd64.zip
    mode: '0644'

- name: Unzip promtail
  unarchive:
    src: /tmp/promtail-linux-amd64.zip
    dest: /tmp/
    remote_src: true

- name: Install promtail binary
  copy:
    src: /tmp/promtail-linux-amd64
    dest: /usr/local/bin/promtail
    remote_src: true
    mode: '0755'

- name: Create promtail config dir
  file:
    path: /etc/promtail
    state: directory
    mode: '0755'

- name: Deploy promtail config
  template:
    src: promtail-config.yml.j2
    dest: /etc/promtail/config.yml
    mode: '0644'

- name: Install promtail service
  copy:
    dest: /etc/systemd/system/promtail.service
    mode: '0644'
    content: |
      [Unit]
      Description=Promtail service
      After=network.target

      [Service]
      User=promtail
      Group=promtail
      ExecStart=/usr/local/bin/promtail -config.file=/etc/promtail/config.yml
      Restart=always
      RestartSec=5s

      [Install]
      WantedBy=multi-user.target

- name: Reload systemd
  systemd:
    daemon_reload: true

- name: Enable promtail
  service:
    name: promtail
    enabled: true
    state: started
