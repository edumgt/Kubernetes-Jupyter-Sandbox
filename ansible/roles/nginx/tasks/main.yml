- name: Install nginx
  apt:
    name: nginx
    state: present

- name: Create web root content
  copy:
    dest: /var/www/html/index.html
    mode: '0644'
    content: |
      <!doctype html>
      <html>
      <head>
        <meta charset="utf-8" />
        <title>NGINX SRE OVA Lab</title>
      </head>
      <body>
        <h1>NGINX SRE OVA Lab</h1>
        <p>Built with Packer + Ansible on WSL Ubuntu.</p>
      </body>
      </html>

- name: Deploy nginx config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    mode: '0644'
  notify: Restart nginx

- name: Create nginx systemd override dir
  file:
    path: /etc/systemd/system/nginx.service.d
    state: directory
    mode: '0755'

- name: Configure nginx restart policy
  copy:
    dest: /etc/systemd/system/nginx.service.d/override.conf
    mode: '0644'
    content: |
      [Service]
      Restart=always
      RestartSec=5s

- name: Reload systemd
  systemd:
    daemon_reload: true

- name: Enable nginx
  service:
    name: nginx
    enabled: true
    state: started
