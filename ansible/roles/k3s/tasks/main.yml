- name: Download k3s installer
  get_url:
    url: https://get.k3s.io
    dest: /tmp/get-k3s.sh
    mode: '0755'

- name: Install k3s single-node cluster
  command: /tmp/get-k3s.sh
  environment:
    INSTALL_K3S_EXEC: "--write-kubeconfig-mode 644 --disable traefik"
  args:
    creates: /usr/local/bin/k3s

- name: Ensure k3s service started
  service:
    name: k3s
    enabled: true
    state: started

- name: Ensure ubuntu kube directory exists
  file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0700'

- name: Copy kubeconfig for ubuntu user
  copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: /home/ubuntu/.kube/config
    remote_src: true
    owner: ubuntu
    group: ubuntu
    mode: '0600'

- name: Replace kubeconfig server with loopback
  replace:
    path: /home/ubuntu/.kube/config
    regexp: 'https://127\.0\.0\.1:6443'
    replace: 'https://127.0.0.1:6443'
