- name: Install prometheus node exporter
  apt:
    name: prometheus-node-exporter
    state: present

- name: Download nginx prometheus exporter
  get_url:
    url: https://github.com/nginx/nginx-prometheus-exporter/releases/download/v1.4.2/nginx-prometheus-exporter_1.4.2_linux_amd64.tar.gz
    dest: /tmp/nginx-prometheus-exporter.tar.gz
    mode: '0644'

- name: Unarchive nginx prometheus exporter
  unarchive:
    src: /tmp/nginx-prometheus-exporter.tar.gz
    dest: /tmp/
    remote_src: true

- name: Install nginx prometheus exporter binary
  copy:
    src: /tmp/nginx-prometheus-exporter
    dest: /usr/local/bin/nginx-prometheus-exporter
    remote_src: true
    mode: '0755'

- name: Create exporter user
  user:
    name: nginxexp
    shell: /usr/sbin/nologin
    system: true
    create_home: false

- name: Install systemd unit for nginx exporter
  template:
    src: nginx-prometheus-exporter.service.j2
    dest: /etc/systemd/system/nginx-prometheus-exporter.service
    mode: '0644'

- name: Reload systemd
  systemd:
    daemon_reload: true

- name: Enable exporters
  service:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - prometheus-node-exporter
    - nginx-prometheus-exporter
