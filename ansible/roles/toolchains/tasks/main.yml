- name: Install Python 3.12 tooling
  apt:
    name:
      - python3-pip
      - python3.12-venv
    state: present

- name: Download NodeSource GPG key
  get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /tmp/nodesource.gpg
    mode: '0644'

- name: Create NodeSource keyring
  command: gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg /tmp/nodesource.gpg
  args:
    creates: /etc/apt/keyrings/nodesource.gpg

- name: Configure NodeSource repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_22.x nodistro main"
    filename: nodesource
    state: present

- name: Install Node.js 22 runtime
  apt:
    name: nodejs
    update_cache: true
    state: present

- name: Enable corepack
  command: corepack enable
  args:
    creates: /usr/bin/pnpm
