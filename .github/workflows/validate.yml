name: validate

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ansible-lint
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint
      - name: Ansible lint
        run: ansible-lint ansible/playbook.yml || true
      - name: Check scripts executable style
        run: |
          bash -n scripts/build_ova.sh
          bash -n scripts/run_wsl.sh
          bash -n scripts/healthcheck.sh
          bash -n scripts/verify.sh
          bash -n tests/test_wsl_scripts.sh
      - name: Run shell tests
        run: bash tests/test_wsl_scripts.sh
