stages:
  - test
  - build
  - deploy

variables:
  DOCKER_TLS_CERTDIR: "/certs"
  IMAGE_PREFIX: "$HARBOR_REGISTRY/$HARBOR_PROJECT"

python_sanity:
  stage: test
  image: python:3.12
  script:
    - python -m compileall apps/backend/app apps/airflow/dags

docker_build_and_push:
  stage: build
  image: docker:27.4.1-cli
  services:
    - docker:27.4.1-dind
  before_script:
    - echo "$HARBOR_PASSWORD" | docker login "$HARBOR_REGISTRY" -u "$HARBOR_USER" --password-stdin
  script:
    - docker build -t "$IMAGE_PREFIX/backend:$CI_COMMIT_SHORT_SHA" apps/backend
    - docker build -t "$IMAGE_PREFIX/frontend:$CI_COMMIT_SHORT_SHA" apps/frontend --build-arg VITE_API_BASE_URL=http://localhost:30081
    - docker build -t "$IMAGE_PREFIX/airflow:$CI_COMMIT_SHORT_SHA" apps/airflow
    - docker build -t "$IMAGE_PREFIX/jupyter:$CI_COMMIT_SHORT_SHA" apps/jupyter
    - docker tag "$IMAGE_PREFIX/backend:$CI_COMMIT_SHORT_SHA" "$IMAGE_PREFIX/backend:latest"
    - docker tag "$IMAGE_PREFIX/frontend:$CI_COMMIT_SHORT_SHA" "$IMAGE_PREFIX/frontend:latest"
    - docker tag "$IMAGE_PREFIX/airflow:$CI_COMMIT_SHORT_SHA" "$IMAGE_PREFIX/airflow:latest"
    - docker tag "$IMAGE_PREFIX/jupyter:$CI_COMMIT_SHORT_SHA" "$IMAGE_PREFIX/jupyter:latest"
    - docker push "$IMAGE_PREFIX/backend:$CI_COMMIT_SHORT_SHA"
    - docker push "$IMAGE_PREFIX/frontend:$CI_COMMIT_SHORT_SHA"
    - docker push "$IMAGE_PREFIX/airflow:$CI_COMMIT_SHORT_SHA"
    - docker push "$IMAGE_PREFIX/jupyter:$CI_COMMIT_SHORT_SHA"
    - docker push "$IMAGE_PREFIX/backend:latest"
    - docker push "$IMAGE_PREFIX/frontend:latest"
    - docker push "$IMAGE_PREFIX/airflow:latest"
    - docker push "$IMAGE_PREFIX/jupyter:latest"

deploy_k8s:
  stage: deploy
  image: bitnami/kubectl:1.32
  needs:
    - docker_build_and_push
  script:
    - echo "$KUBECONFIG_B64" | base64 -d > kubeconfig
    - export KUBECONFIG="$CI_PROJECT_DIR/kubeconfig"
    - kubectl apply -k infra/k8s/base
    - kubectl set image deployment/backend backend="$IMAGE_PREFIX/backend:latest" -n data-platform
    - kubectl set image deployment/frontend frontend="$IMAGE_PREFIX/frontend:latest" -n data-platform
    - kubectl set image deployment/airflow airflow="$IMAGE_PREFIX/airflow:latest" -n data-platform
    - kubectl set image deployment/jupyter jupyter="$IMAGE_PREFIX/jupyter:latest" -n data-platform
    - kubectl rollout status deployment/backend -n data-platform --timeout=180s
    - kubectl rollout status deployment/frontend -n data-platform --timeout=180s
    - kubectl rollout status deployment/airflow -n data-platform --timeout=180s
    - kubectl rollout status deployment/jupyter -n data-platform --timeout=180s
