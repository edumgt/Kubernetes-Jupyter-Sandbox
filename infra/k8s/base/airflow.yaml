apiVersion: v1
kind: Service
metadata:
  name: airflow
spec:
  type: NodePort
  selector:
    app: airflow
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow
  template:
    metadata:
      labels:
        app: airflow
    spec:
      containers:
        - name: airflow
          image: harbor.local/data-platform/airflow:latest
          imagePullPolicy: IfNotPresent
          command: ["bash", "-lc", "airflow standalone"]
          ports:
            - containerPort: 8080
          env:
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "false"
            - name: AIRFLOW__WEBSERVER__EXPOSE_CONFIG
              value: "true"
